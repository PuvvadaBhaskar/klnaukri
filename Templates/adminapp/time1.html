{% extends "navbar/adminnavbar.html" %}
{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TimeZone</title>
</head>
<body>
{%block body%}
<div class="container text-center" style="margin-top:50px;">
    <div class="row align-items-center">

        <!-- INPUT COLUMN -->
        <div class="col"
             style="background-color:#f8f9fa; border:1px solid #ddd; padding:30px; border-radius:8px; font-weight:600;">

            <h1>Input</h1>

            <form method="POST" action="{% url 'printer' %}">
                {% csrf_token %}

                <div class="input-group mb-3">
                    <span class="input-group-text">@</span>
                    <input type="text" name="klu" class="form-control"
                           placeholder="Enter something">
                </div>

                <button type="submit" class="btn btn-outline-success">Submit</button>
            </form>

        </div>

        <!-- OUTPUT COLUMN -->
        <div class="col"
             style="background-color:#f8f9fa; border:1px solid #ddd; padding:30px; border-radius:8px; font-weight:600;">

            <h1>Output</h1>

            {% if klu %}
                <h3 class="mt-3 text-success">{{ klu }}</h3>
            {% else %}
                <p class="mt-3 text-muted">No output yet</p>
            {% endif %}

        </div>

    </div>
</div>

{%endblock%}

</body>
</html>
